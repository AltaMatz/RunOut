{% extends "base.html" %}

{% block title %}Piantina - Runout{% endblock %}

{% block content %}
<div class="page-container">
    <div class="content-section">
        <h2>PIANTINA</h2>
        <p>Visualizza la piantina dell'istituto con la disposizione delle aule e dei punti di raccolta.</p>
        <div class="pdf-wrapper">
            <object
                class="pdf-viewer"
                data="{{ pdf_path }}#view=FitH"
                type="application/pdf"
                aria-label="Piantina Istituto">
                <p class="pdf-fallback">
                    Il browser non supporta l'anteprima PDF.
                    <a href="{{ pdf_path }}" target="_blank" rel="noopener">Apri il PDF in una nuova scheda</a>.
                </p>
            </object>
        </div>
        <div class="pdf-actions">
            <a href="{{ pdf_path }}" target="_blank" rel="noopener" class="pdf-link">Apri a schermo intero</a>
            <a href="{{ pdf_path }}" download class="pdf-link pdf-link-secondary">Scarica PDF</a>
        </div>
    </div>
</div>

<style>
    .pdf-wrapper {
        width: 100%;
        max-width: 1100px;
        height: clamp(420px, 72vh, 900px);
        margin: 1rem auto 0;
        overflow: hidden;
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        background: #f7f7f7;
    }

    .pdf-viewer {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
    }

    .pdf-fallback {
        padding: 1rem;
        color: #4a5568;
    }

    .pdf-actions {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 0.9rem;
        flex-wrap: wrap;
    }

    .pdf-link {
        display: inline-block;
        padding: 0.6rem 1rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        background: #2d3748;
        color: #ffffff;
    }

    .pdf-link-secondary {
        background: #edf2f7;
        color: #2d3748;
    }

    @media (max-width: 900px) {
        .pdf-wrapper {
            height: 62vh;
        }
    }
</style>
{% endblock %}
